name: Publish Articles From SharePoint

on:
  schedule:
    # Runs every 10 minutes (GitHub schedule is UTC)
    - cron: "*/10 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Node dependency (node-fetch v2)
        run: npm install node-fetch@2

      - name: Pull and publish new articles from SharePoint
        env:
          TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}

          # Your SharePoint Site ID and Document Library Drive ID
          SITE_ID: ${{ secrets.SHAREPOINT_SITE_ID }}
          DRIVE_ID: ${{ secrets.DOCUMENT_LIBRARY_ID }}

          # Folder containing processed files (relative to the library root)
          PROCESSED_PATH: "Processed"

          # Column internal name and status values
          STATUS_FIELD: "PublishStatus"
          STATUS_NEW: "New"
          STATUS_PUBLISHED: "Published"
        run: node scripts/publish-articles.js

      - name: Commit and push changes (if any)
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add articles/
          git commit -m "Publish new articles from SharePoint" || exit 0
          git push